<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kelola Pengguna - LUMIÈRE Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">LUMI<span>ÈRE</span> Admin</div>
      <ul class="sidebar-menu">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="manage-articles.html">📝 Kelola Artikel</a></li>
        <li><a href="manage-products.html">📦 Kelola Produk</a></li>
        <li><a href="manage-users.html" class="active">👥 Kelola Pengguna</a></li>
        <li><a href="manage-transactions.html">💰 Kelola Transaksi</a></li>
        <li class="logout"><a href="../index.html">🏠 Kembali ke Website</a></li>
      </ul>
    </aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <h1>👥 Kelola Pengguna</h1>
        <button class="btn btn-primary" onclick="openAddModal()">+ Tambah Pengguna</button>
      </div>

      <div class="grid-4 mb-24">
        <div class="stat-card"><div class="icon pink">👥</div><div class="value">1,284</div><div class="label">Total Pengguna</div></div>
        <div class="stat-card"><div class="icon green">✅</div><div class="value">1,156</div><div class="label">Aktif</div></div>
        <div class="stat-card"><div class="icon mauve">🆕</div><div class="value">48</div><div class="label">Baru Bulan Ini</div></div>
        <div class="stat-card"><div class="icon gold">👑</div><div class="value">5</div><div class="label">Admin</div></div>
      </div>

      <div class="flex gap-16 mb-24 flex-wrap">
        <div class="search-bar flex-1 max-w-100"><input type="text" placeholder="Cari pengguna..."></div>
        <select class="form-control w-auto" title="Filter Role"><option>Semua Role</option><option>Admin</option><option>Customer</option></select>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>No</th><th>Nama</th><th>Email</th><th>Role</th><th>Bergabung</th><th>Status</th><th>Aksi</th></tr></thead>
          <tbody id="userTableBody">
            <!-- Data will be rendered here dynamically -->
          </tbody>
        </table>
      </div>
      <div class="pagination"><button class="page-btn active">1</button><button class="page-btn">2</button><button class="page-btn">3</button><button class="page-btn">→</button></div>
    </main>
  </div>

  <div class="modal-overlay" id="userModal">
    <div class="modal">
      <div class="modal-header"><h3>Tambah / Edit Pengguna</h3><button class="modal-close" onclick="closeModal('userModal')">×</button></div>
      <input type="hidden" id="userId">
      <div class="grid-2">
        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="userName" class="form-control" placeholder="Nama lengkap"></div>
        <div class="form-group"><label>Email</label><input type="email" id="userEmail" class="form-control" placeholder="email@example.com"></div>
      </div>
      <div class="grid-2">
        <div class="form-group"><label>Role</label><select id="userRole" class="form-control" title="Pilih role pengguna"><option>Customer</option><option>Admin</option></select></div>
        <div class="form-group"><label>Status</label><select id="userStatus" class="form-control" title="Pilih status pengguna"><option>Aktif</option><option>Nonaktif</option></select></div>
      </div>
      <div class="form-group"><label>Password</label><input type="password" id="userPassword" class="form-control" placeholder="••••••••"></div>
      <div class="flex gap-12 justify-end"><button class="btn btn-secondary" onclick="closeModal('userModal')">Batal</button><button class="btn btn-primary" onclick="saveUser()">Simpan</button></div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    // Transient cache (in-memory state)
    let users = [
      { id: 1, name: 'Reta Hadiana', email: 'reta@email.com', role: 'Admin', date: '1 Jan 2026', status: 'Aktif', avatarColor: 'pink' },
      { id: 2, name: 'Anisa Rahma', email: 'anisa@email.com', role: 'Customer', date: '15 Feb 2026', status: 'Aktif', avatarColor: 'mauve' },
      { id: 3, name: 'Dewi Kartika', email: 'dewi@email.com', role: 'Customer', date: '20 Mar 2026', status: 'Aktif', avatarColor: 'gold' },
      { id: 4, name: 'Mega Sari', email: 'mega@email.com', role: 'Customer', date: '5 Apr 2026', status: 'Nonaktif', avatarColor: 'pink' },
      { id: 5, name: 'Bella Amelia', email: 'bella@email.com', role: 'Admin', date: '10 Jan 2026', status: 'Aktif', avatarColor: 'mauve' }
    ];

    function renderTable() {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';
      users.forEach((u, index) => {
        const tr = document.createElement('tr');
        tr.className = 'searchable';
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>
            <div class="flex gap-12 align-center">
              <div class="avatar avatar-${u.avatarColor}">👤</div>
              <strong>${u.name}</strong>
            </div>
          </td>
          <td>${u.email}</td>
          <td><span class="status status-${u.role === 'Admin' ? 'info' : 'success'}">${u.role}</span></td>
          <td>${u.date}</td>
          <td><span class="status status-${u.status === 'Aktif' ? 'success' : 'danger'}">${u.status}</span></td>
          <td>
            <button class="btn btn-sm btn-secondary" onclick="editUser(${u.id})">✏️</button>
            <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">🗑️</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function clearForm() {
      document.getElementById('userId').value = '';
      document.getElementById('userName').value = '';
      document.getElementById('userEmail').value = '';
      document.getElementById('userRole').value = 'Customer';
      document.getElementById('userStatus').value = 'Aktif';
      document.getElementById('userPassword').value = '';
    }

    function openAddModal() {
      clearForm();
      openModal('userModal');
    }

    function editUser(id) {
      const u = users.find(x => x.id === id);
      if(u) {
        document.getElementById('userId').value = u.id;
        document.getElementById('userName').value = u.name;
        document.getElementById('userEmail').value = u.email;
        document.getElementById('userRole').value = u.role;
        document.getElementById('userStatus').value = u.status;
        document.getElementById('userPassword').value = ''; // leave blank
        openModal('userModal');
      }
    }

    function deleteUser(id) {
      if(confirm('Apakah Anda yakin ingin menghapus pengguna ini?')) {
        users = users.filter(x => x.id !== id);
        renderTable();
        showToast('Pengguna berhasil dihapus!');
      }
    }

    function saveUser() {
      const id = document.getElementById('userId').value;
      const name = document.getElementById('userName').value;
      const email = document.getElementById('userEmail').value;
      const role = document.getElementById('userRole').value;
      const status = document.getElementById('userStatus').value;
      
      if(!name || !email) {
        alert('Nama dan Email wajib diisi!');
        return;
      }

      if(id) {
        // Edit existing user
        const uIndex = users.findIndex(x => x.id == id);
        if(uIndex !== -1) {
          users[uIndex].name = name;
          users[uIndex].email = email;
          users[uIndex].role = role;
          users[uIndex].status = status;
        }
        showToast('Pengguna berhasil diperbarui!');
      } else {
        // Create new user
        const newId = users.length > 0 ? Math.max(...users.map(x => x.id)) + 1 : 1;
        const now = new Date();
        const dateStr = `${now.getDate()} ${now.toLocaleString('id-ID', { month: 'short' })} ${now.getFullYear()}`;
        const colors = ['pink', 'mauve', 'gold'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        users.push({
          id: newId,
          name: name,
          email: email,
          role: role,
          date: dateStr,
          status: status,
          avatarColor: randomColor
        });
        showToast('Pengguna berhasil ditambahkan!');
      }
      
      closeModal('userModal');
      renderTable();
    }

    // Render initial table on load
    document.addEventListener('DOMContentLoaded', () => {
      renderTable();
    });
  </script>
</body>
</html>
